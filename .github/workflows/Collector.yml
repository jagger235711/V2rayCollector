name: Collector
on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old Releases and Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{secrets.GITHUB_TOKEN}}
          delete_releases: true
          releases_keep_latest: 3
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 3

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Cleanup results directory
        run: |
          rm -rf results/*
          mkdir -p results

      - uses: actions/setup-go@v4
        with:
          go-version: ">=1.21.3"
      - run: go version

      - name: Build and run Golang file
        run: |
          go build -o myapp
          ./myapp -sort -log warn

      - name: Start subconverter and send request
        run: |
          # 启动 subconverter 容器
          docker run -d --name subconverter_container --restart=always -v $(pwd)/results:/subconverter/results -p 25500:25500 asdlokj1qpi23/subconverter:latest

          # 等待容器服务就绪
          until curl -s http://localhost:25500/version | grep "subconverter v"; do
            sleep 1
          done

          # 检查 subList.csv 文件是否存在
          if [ -f "subList.csv" ]; then
            # 读取订阅链接并使用 | 分割
            LINKS=$(cat subList.csv | tr '\n' '|')
            LINKS="${LINKS%|}"

            # 构造完整的请求 URL
            FULL_URL="http://0.0.0.0:25500/sub?target=mixed&url=$LINKS"
            echo "Full URL: $FULL_URL"

            # 发送请求并保存结果
            curl -o ./results/mixed_base64.txt "$FULL_URL"
            if [ $? -ne 0 ]; then
              echo "Request to subconverter failed."
              kill $SUBPROCESS_PID
              exit 1
            fi
          else
            echo "subList.csv file not found."
            kill $SUBPROCESS_PID
            exit 1
          fi

      - name: Decode base64 and append to mixed.txt
        run: |
          base64 -d ./results/mixed_base64.txt >> ./results/mixed.txt

      - name: Speedtest
        run: |
          echo "执行性能测试前检查输入文件..."
          if [ ! -f "./results/mixed.txt" ]; then
            echo "Error: mixed.txt 文件不存在，无法执行性能测试"
            exit 1
          fi
          ./tool/speedTest_singtools/singtools test -i ./results/mixed.txt -c ./tool/speedTest_singtools/config.json -o ./results/mixed_tested.json -e fatal -f ""
          echo "性能测试完成，检查输出文件..."
          if [ ! -f "./results/mixed_tested.json" ]; then
            echo "Error: 性能测试未生成 mixed_tested.json 文件"
            exit 1
          fi
          echo "mixed_tested.json 文件大小: $(wc -c ./results/mixed_tested.json)"

      - name: Convert to mixed with base64encode
        run: |
          # 增强路径验证和日志输出
          if [ ! -f "./results/mixed_tested.json" ]; then
            echo "Error: mixed_tested.json 文件不存在于 $(pwd)/results/ 目录"
            exit 1
          fi

          # 检查文件大小是否为0
          if [ ! -s "./results/mixed_tested.json" ]; then
            echo "Error: mixed_tested.json 文件为空，无法进行转换"
            exit 1
          fi

          # 确保 subconverter 容器已启动并响应
          until curl -s http://localhost:25500/version | grep "subconverter v"; do
            sleep 1
          done

          # 显示容器内挂载目录内容（调试用）
          docker exec subconverter_container sh -c "ls -l /subconverter/results && echo '挂载目录内容检查完成'"

          # 显式声明完整URL并添加调试输出
          full_url="http://localhost:25500/sub?target=mixed&url=file:///subconverter/results/mixed_tested.json"
          echo "正在使用的完整URL地址: $full_url"

          echo "\n------------------"
          echo "当前工作目录: $(pwd)"
          echo "mixed_tested.json 路径: $(realpath ./results/mixed_tested.json)"
          echo "容器内对应路径: /subconverter/results/mixed_tested.json"
          echo "Full URL: $full_url"
          echo "\n------------------"

          # 移除错误信息抑制并显示详细curl输出
          if ! curl -v -o ./results/mixed_tested.txt "$full_url"; then
            echo "curl 请求失败，请检查以下信息:"
            echo "1. 容器挂载目录内容:"
            docker exec subconverter_container sh -c "ls -l /subconverter/results"
            echo "2. 当前工作目录文件列表:"
            ls -l ./results/
            echo "3. 请求的URL地址: $full_url"
            exit 1
          fi

          # 验证输出文件内容
          if [ ! -s "./results/mixed_tested.txt" ]; then
            echo "生成的 mixed_tested.txt 文件为空，转换失败"
            exit 1
          fi

      - name: Commit Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git pull origin main
          git add ./results/*
          git checkout main
          git commit -m "✔️ $(date '+%Y-%m-%d %H:%M:%S') Collected"
     
      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          branch: main

name: Collector
on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old Releases and Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{secrets.GITHUB_TOKEN}}
          delete_releases: true
          releases_keep_latest: 3
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 3

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Cleanup results directory
        run: |
          rm -rf results/*
          mkdir -p results

      - uses: actions/setup-go@v4
        with:
          go-version: ">=1.21.3"
      - run: go version

      - name: Build and run Golang file
        run: |
          go build -o myapp
          ./myapp -sort -log warn

      - name: Start subconverter and send request
        run: |
          # 启动 subconverter 容器
          # 修正挂载路径并添加详细调试日志
          echo "=== 容器挂载调试开始 ==="
          echo "当前工作目录: $(pwd)"
          echo "宿主机挂载源目录: $(pwd)/results"
          echo "容器内部目标目录: /subconverter/results"
          docker run -d --name subconverter_container --restart=always \
            -v $(pwd)/results:/subconverter/results \
            -p 25500:25500 \
            asdlokj1qpi23/subconverter:latest
          echo "容器启动后立即检查挂载目录..."
          docker exec subconverter_container sh -c "ls -laR /subconverter && echo '完整目录结构检查完成'"
          echo "挂载验证: 确认宿主机results目录与容器/subconverter/results已正确绑定"
          echo "=== 容器挂载调试结束 ==="


          # 检查 subList.csv 文件是否存在
          if [ -f "subList.csv" ]; then
            # 读取订阅链接并使用 | 分割
            LINKS=$(cat subList.csv | tr '\n' '|')
            LINKS="${LINKS%|}"

            # 构造完整的请求 URL
            FULL_URL="http://0.0.0.0:25500/sub?target=mixed&url=$LINKS"
            echo "Full URL: $FULL_URL"

            # 发送请求并保存结果
            curl -o ./results/mixed_base64.txt "$FULL_URL"
            if [ $? -ne 0 ]; then
              echo "Request to subconverter failed."
              kill $SUBPROCESS_PID
              exit 1
            fi
          else
            echo "subList.csv file not found."
            kill $SUBPROCESS_PID
            exit 1
          fi

      - name: Decode base64 and append to mixed.txt
        run: |
          base64 -d ./results/mixed_base64.txt >> ./results/mixed.txt

      - name: Clean mixed.txt content
        run: |
          # 检查文件是否存在
          if [ ! -f "./results/mixed.txt" ]; then
            echo "Error: mixed.txt 文件不存在"
            exit 1
          fi
          
          # 创建临时文件
          echo "开始清理文件内容..."
          
          # 处理文件：
          # 1. 移除前导和后导空格
          # 2. 删除空行
          # 3. 保存到临时文件
          cat "./results/mixed.txt" | \
            sed 's/^[ \t]*//;s/[ \t]*$//' | \
            sed '/^$/d' > "./results/mixed.txt.tmp"
          
          # 用处理后的文件替换原文件
          mv "./results/mixed.txt.tmp" "./results/mixed.txt"
          
          # 显示处理结果
          echo "清理完成。文件统计信息："
          echo "总行数: $(wc -l < ./results/mixed.txt)"
          echo "文件大小: $(wc -c < ./results/mixed.txt) 字节"
          
          # 预览处理后的内容
          echo "\n处理后的前5行内容："
          head -n 50 "./results/mixed.txt"

      - name: Speedtest
        run: |
          echo "执行性能测试前检查输入文件..."
          if [ ! -f "./results/mixed.txt" ]; then
            echo "Error: mixed.txt 文件不存在，无法执行性能测试"
            exit 1
          fi
          ./tool/speedTest_singtools/singtools test -i ./results/mixed.txt -c ./tool/speedTest_singtools/config.json -o ./results/mixed_tested.json -e fatal -f ""
          echo "性能测试完成，检查输出文件..."
          if [ ! -f "./results/mixed_tested.json" ]; then
            echo "Error: 性能测试未生成 mixed_tested.json 文件"
            exit 1
          fi
          echo "mixed_tested.json 文件大小: $(wc -c ./results/mixed_tested.json)"

      - name: Convert to mixed with base64encode
        run: |
          # 增强路径验证和日志输出
          if [ ! -f "./results/mixed_tested.json" ]; then
            echo "Error: mixed_tested.json 文件不存在于 $(pwd)/results/ 目录"
            exit 1
          fi

          # 显式声明完整URL并添加调试输出
          # full_url="http://localhost:25500/sub?target=mixed&url=file:///subconverter/results/mixed_tested.json"

          full_url="http://localhost:25500/sub?target=mixed&url=/subconverter/results/mixed_tested.json"
          echo "正在使用的完整URL地址: $full_url"

          echo "\n------------------"
          echo "当前工作目录: $(pwd)"
          echo "mixed_tested.json 路径: $(realpath ./results/mixed_tested.json)"
          echo "容器内对应路径: /subconverter/results/mixed_tested.json"
          echo "Full URL: $full_url"
          echo "\n------------------"

          # 移除错误信息抑制并显示详细curl输出
          if ! curl -v -o ./results/mixed_tested.txt "$full_url"; then
            echo "curl 请求失败，请检查以下信息:"
            echo "1. 容器挂载目录内容:"
            docker exec subconverter_container sh -c "ls -l /subconverter/results"
            echo "2. 当前工作目录文件列表:"
            ls -l ./results/
            echo "3. 请求的URL地址: $full_url"
            exit 1
          fi

          # 验证输出文件内容
          if [ ! -s "./results/mixed_tested.txt" ]; then
            echo "生成的 mixed_tested.txt 文件为空，转换失败"
            exit 1
          fi

      - name: Commit Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git pull origin main
          git add ./results/*
          git checkout main
          git commit -m "✔️ $(date '+%Y-%m-%d %H:%M:%S') Collected"
     
      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          branch: main